name: Sync Notion to Zenn/Qiita

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 30 分おきに実行
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: npm run sync

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # デバッグ：現在のディレクトリと articles/ の状態を確認
          echo "=== Current directory ==="
          pwd
          echo "=== articles/ directory contents ==="
          ls -la articles/ 2>/dev/null || echo "articles/ directory not found"
          echo "=== git status before ==="
          git status

          # git status で変更があるか確認
          if git status --porcelain | grep -q .; then
            echo "Changes detected:"
            git status

            # 変更が含まれるディレクトリのみ追加する（存在しないディレクトリは failure 回避）
            git add articles/ 2>/dev/null || true
            git add public/ 2>/dev/null || true
            git add images/ 2>/dev/null || true

            if git diff --cached --quiet; then
              echo "No staged changes to commit"
            else
              git commit -m "chore: sync notion articles"
              git push
            fi
          else
            echo "No changes detected by git status --porcelain"
            echo "=== Checking if articles exist ==="
            if [ -d "articles" ] && [ "$(ls -A articles 2>/dev/null)" ]; then
              echo "articles/ directory exists with files:"
              ls -la articles/
            else
              echo "articles/ directory is empty or does not exist"
            fi
          fi

      - name: Publish to Qiita
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          if [ -d "public" ] && [ "$(ls -A public)" ]; then
            npx qiita-cli publish
          else
            echo "No Qiita articles to publish"
          fi
