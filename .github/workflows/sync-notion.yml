name: Sync Notion to Zenn/Qiita

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 30 分おきに実行
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: npm run sync

      - name: Update GitHub repository topics
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
        run: |
          node -e "
            const { Client } = require('@notionhq/client');
            const notion = new Client({ auth: process.env.NOTION_TOKEN });
            const databaseId = process.env.NOTION_DATABASE_ID;
            
            async function updateTopics() {
              try {
                const response = await notion.databases.query({
                  database_id: databaseId,
                  filter: {
                    or: [
                      { property: 'Published', checkbox: { equals: true } },
                      { property: 'Commit', checkbox: { equals: true } }
                    ]
                  },
                  pages: { size: 100 }
                });
                
                const topicsSet = new Set();
                for (const page of response.results) {
                  const topics = page.properties.Topics?.multi_select?.map(t => t.name) || [];
                  topics.forEach(topic => {
                    // GitHub topics の形式に変換（小文字、スペースをハイフン、特殊文字を除去）
                    let normalized = topic.toLowerCase().replace(/\s+/g, '-').replace(/[^a-z0-9-]/g, '');
                    if (normalized.length > 0 && normalized.length <= 30) {
                      topicsSet.add(normalized);
                    }
                  });
                }
                
                const topics = Array.from(topicsSet).slice(0, 20);
                console.log('Topics to set:', topics);
                
                if (topics.length === 0) {
                  console.log('No topics found in Notion articles');
                  return;
                }
                
                const repo = process.env.GITHUB_REPOSITORY;
                const [owner, repoName] = repo.split('/');
                
                const updateResponse = await fetch(\`https://api.github.com/repos/\${owner}/\${repoName}/topics\`, {
                  method: 'PUT',
                  headers: {
                    'Authorization': \`token \${process.env.GITHUB_TOKEN}\`,
                    'Accept': 'application/vnd.github.mercy-preview+json',
                    'Content-Type': 'application/json'
                  },
                  body: JSON.stringify({ names: topics })
                });
                
                if (updateResponse.ok) {
                  console.log('✓ GitHub topics updated successfully');
                } else {
                  console.error('✗ Failed to update GitHub topics:', await updateResponse.text());
                }
              } catch (error) {
                console.error('✗ Error updating topics:', error.message);
              }
            }
            
            updateTopics();
          "

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # デバッグ情報
          echo "=== Current directory ==="
          pwd
          echo "=== articles/ directory ==="
          ls -la articles/ 2>/dev/null || echo "articles/ not found"
          echo "=== images/ directory ==="
          ls -la images/ 2>/dev/null || echo "images/ not found"

          # 強制的に articles/, public/, images/ を追加
          echo "=== Adding files ==="
          git add articles/ 2>/dev/null || true
          git add public/ 2>/dev/null || true
          git add images/ 2>/dev/null || true

          # ステージされた変更を確認
          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            echo "=== Checking file timestamps ==="
            # ファイルの更新日時を確認
            if [ -d "articles" ] && [ "$(ls -A articles 2>/dev/null)" ]; then
              echo "articles/ files and their modification times:"
              stat articles/* 2>/dev/null | grep -E "(File:|Modify:)" || true
            fi
            echo "=== git status ==="
            git status
            echo "=== git diff HEAD ==="
            git diff HEAD
          else
            echo "Changes staged:"
            git diff --cached --stat
            git commit -m "chore: sync notion articles"
            git push
          fi

      - name: Publish to Qiita
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          if [ -d "public" ] && [ "$(ls -A public)" ]; then
            npx qiita-cli publish
          else
            echo "No Qiita articles to publish"
          fi
