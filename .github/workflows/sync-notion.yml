name: Sync Notion to Zenn/Qiita

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 30 分おきに実行
    - cron: "*/30 * * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: npm run sync

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # デバッグ情報
          echo "=== Current directory ==="
          pwd
          echo "=== articles/ directory ==="
          ls -la articles/ 2>/dev/null || echo "articles/ not found"
          echo "=== images/ directory ==="
          ls -la images/ 2>/dev/null || echo "images/ not found"

          # 強制的に articles/, public/, images/ を追加
          echo "=== Adding files ==="
          git add articles/ 2>/dev/null || true
          git add public/ 2>/dev/null || true
          git add images/ 2>/dev/null || true

          # ステージされた変更を確認
          if git diff --cached --quiet; then
            echo "No staged changes to commit"
            echo "=== git status ==="
            git status
          else
            echo "Changes staged:"
            git diff --cached --stat
            git commit -m "chore: sync notion articles"
            git push
          fi

      - name: Publish to Qiita
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          if [ -d "public" ] && [ "$(ls -A public)" ]; then
            npx qiita-cli publish
          else
            echo "No Qiita articles to publish"
          fi
