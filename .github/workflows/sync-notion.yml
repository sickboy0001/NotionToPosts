name: Sync Notion to Zenn/Qiita

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
  schedule:
    # 毎日午前9時（JST = UTC+9）に実行
    - cron: "0 0 * * *"

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"

      - name: Install dependencies
        run: npm ci

      - name: Run Notion sync
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_DATABASE_ID: ${{ secrets.NOTION_DATABASE_ID }}
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: npm run sync

      - name: Commit and push changes
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          if git diff --quiet; then
            echo "No changes detected"
          else
            git add articles/ public/ images/
            git commit -m "chore: sync notion articles [skip ci]"
            git push
          fi

      - name: Publish to Qiita
        env:
          QIITA_TOKEN: ${{ secrets.QIITA_TOKEN }}
        run: |
          if [ -d "public" ] && [ "$(ls -A public)" ]; then
            npx qiita-cli publish
          else
            echo "No Qiita articles to publish"
          fi
